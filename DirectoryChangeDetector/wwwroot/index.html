<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Directory Change Detector</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            max-width: 820px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.45;
        }
        h1 { font-size: 1.5rem; }
        .controls { display: flex; gap: .5rem; margin: 1rem 0; }
        #path { flex: 1; padding: .5rem; font-size: 1rem; }
        button { padding: .5rem 1rem; font-size: 1rem; cursor: pointer; }
        button:disabled { cursor: progress; opacity: .6; }
        .hint { color: #888; font-size: .85rem; }
        .banner { padding: .6rem .8rem; border-radius: .4rem; margin: 1rem 0; }
        .banner.error { background: #fdecea; color: #611a15; }
        .banner.info { background: #e8f0fe; color: #174ea6; }
        .meta { color: #888; font-size: .85rem; margin-bottom: 1rem; }
        section { margin-bottom: 1.2rem; }
        section h2 { font-size: 1rem; margin: 0 0 .4rem; }
        ul { margin: 0; padding-left: 1.2rem; }
        li { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: .9rem; }
        .badge {
            display: inline-block; background: #e0e0e0; color: #333;
            border-radius: .8rem; padding: 0 .5rem; font-size: .75rem; margin-left: .4rem;
        }
        .empty { color: #999; font-style: italic; }
        .hidden { display: none; }
    </style>
</head>
<body>
<h1>Directory Change Detector</h1>
<p class="hint">Enter an absolute directory path and click <em>Analyze</em>. The first run only
    establishes a baseline; later runs report new, changed and deleted entries.</p>

<div class="controls">
    <input id="path" type="text" placeholder="C:\some\absolute\path" autocomplete="off"/>
    <button id="analyze" type="button">Analyze</button>
</div>

<div id="status" class="banner info hidden"></div>
<div id="error" class="banner error hidden"></div>

<div id="result" class="hidden">
    <div id="meta" class="meta"></div>

    <section>
        <h2>New files</h2>
        <ul id="newFiles"></ul>
    </section>
    <section>
        <h2>Changed files</h2>
        <ul id="changedFiles"></ul>
    </section>
    <section>
        <h2>Deleted files</h2>
        <ul id="deletedFiles"></ul>
    </section>
    <section>
        <h2>Deleted directories</h2>
        <ul id="deletedDirectories"></ul>
    </section>
</div>

<script>
    const $ = (id) => document.getElementById(id);
    const pathInput = $("path");
    const analyzeButton = $("analyze");

    function show(el, visible) { el.classList.toggle("hidden", !visible); }

    function setStatus(message) {
        const el = $("status");
        el.textContent = message;
        show(el, Boolean(message));
    }

    function setError(message) {
        const el = $("error");
        el.textContent = message;
        show(el, Boolean(message));
    }

    function renderList(id, items, render) {
        const ul = $(id);
        ul.innerHTML = "";
        if (!items || items.length === 0) {
            const li = document.createElement("li");
            li.className = "empty";
            li.textContent = "(none)";
            ul.appendChild(li);
            return;
        }
        for (const item of items) {
            const li = document.createElement("li");
            li.innerHTML = render(item);
            ul.appendChild(li);
        }
    }

    function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (c) => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[c]));
    }

    function renderReport(report) {
        const scannedAt = new Date(report.scannedAt).toLocaleString();
        const firstRun = report.isFirstRun
            ? ` &middot; first run: baseline created (${report.indexedFileCount} files indexed)`
            : ` &middot; ${report.indexedFileCount} files indexed`;
        $("meta").innerHTML = `Scanned at ${escapeHtml(scannedAt)}${firstRun}`;

        const fileChange = (f) => `${escapeHtml(f.path)}<span class="badge">v${f.version}</span>`;
        const plain = (p) => escapeHtml(p);

        renderList("newFiles", report.newFiles, fileChange);
        renderList("changedFiles", report.changedFiles, fileChange);
        renderList("deletedFiles", report.deletedFiles, plain);
        renderList("deletedDirectories", report.deletedDirectories, plain);

        show($("result"), true);
    }

    async function analyze() {
        const path = pathInput.value.trim();
        setError("");
        show($("result"), false);

        if (!path) {
            setError("Please enter a directory path.");
            return;
        }

        analyzeButton.disabled = true;
        setStatus("Analyzing…");
        try {
            const response = await fetch("/api/v1/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ path })
            });

            const body = await response.json().catch(() => null);

            if (!response.ok) {
                const detail = body && (body.detail || body.title) || `Request failed (${response.status}).`;
                setError(detail);
                return;
            }

            renderReport(body);
        } catch (e) {
            setError(`Could not reach the API: ${e.message}`);
        } finally {
            analyzeButton.disabled = false;
            setStatus("");
        }
    }

    analyzeButton.addEventListener("click", analyze);
    pathInput.addEventListener("keydown", (e) => { if (e.key === "Enter") analyze(); });
</script>
</body>
</html>
